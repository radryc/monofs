<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="100%" height="100%" style="background-color:#0d1117;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="gDev" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="gRouter" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="gStorage" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="gFetcher" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="gSearch" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#be185d"/></linearGradient>
    <linearGradient id="gUpstream" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#64748b"/><stop offset="100%" stop-color="#475569"/></linearGradient>
    <linearGradient id="gSession" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L8,5 L0,9 Z" fill="#64748b"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L8,5 L0,9 Z" fill="#60a5fa"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L8,5 L0,9 Z" fill="#34d399"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- Background grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.4">
    <line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="480" x2="960" y2="480"/>
    <line x1="240" y1="0" x2="240" y2="620"/>
    <line x1="480" y1="0" x2="480" y2="620"/>
    <line x1="720" y1="0" x2="720" y2="620"/>
  </g>

  <text x="480" y="40" fill="#f8fafc" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="1">MonoFS Architecture</text>
  <text x="480" y="65" fill="#64748b" font-size="13" text-anchor="middle">Distributed source workspace, code search, and publish engine</text>

  <!-- Developer Machine -->
  <rect x="30" y="95" width="190" height="500" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>

  <!-- FUSE Client -->
  <rect x="50" y="120" width="150" height="70" rx="8" fill="url(#gDev)" filter="url(#shadow)"/>
  <text x="125" y="145" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">FUSE Client</text>
  <text x="125" y="162" fill="#bfdbfe" font-size="11" text-anchor="middle">Virtual Monorepo Mount</text>
  <text x="125" y="178" fill="#bfdbfe" font-size="11" text-anchor="middle">+ Writable Overlay</text>

  <!-- Session CLI -->
  <rect x="50" y="220" width="150" height="55" rx="8" fill="url(#gSession)" filter="url(#shadow)"/>
  <text x="125" y="242" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Session CLI</text>
  <text x="125" y="260" fill="#cffafe" font-size="11" text-anchor="middle">status · diff · commit · pull</text>

  <!-- Client arrow to Router (control) -->
  <path d="M200,155 C250,155 265,180 265,210" stroke="#60a5fa" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="245" y="180" fill="#60a5fa" font-size="9" font-family="monospace">gRPC</text>

  <!-- Session arrow to Router (publish) -->
  <path d="M200,248 C250,248 265,250 265,300" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="248" y="272" fill="#06b6d4" font-size="9" font-family="monospace">Unix socket</text>

  <!-- Developer Machine label -->
  <text x="125" y="575" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">Developer Machine</text>

  <!-- Cluster boundary -->
  <rect x="280" y="95" width="650" height="500" rx="14" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="8,6"/>
  <text x="605" y="117" fill="#475569" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="3">MONOFS CLUSTER</text>

  <!-- Router -->
  <rect x="300" y="140" width="200" height="75" rx="8" fill="url(#gRouter)" filter="url(#shadow)"/>
  <text x="400" y="165" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">Router (Control Plane)</text>
  <text x="400" y="183" fill="#e0e7ff" font-size="11" text-anchor="middle">Topology · Health · Ingest · Publish</text>
  <text x="400" y="198" fill="#e0e7ff" font-size="11" text-anchor="middle">gRPC :9090 | Web UI :8080</text>

  <!-- Storage Nodes -->
  <rect x="300" y="405" width="220" height="90" rx="8" fill="url(#gStorage)" filter="url(#shadow)"/>
  <text x="410" y="430" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">Storage Nodes (sharded)</text>
  <text x="410" y="450" fill="#d1fae5" font-size="11" text-anchor="middle">Indexed-Tail WORM · HRW placement</text>
  <text x="410" y="467" fill="#d1fae5" font-size="11" text-anchor="middle">Replication · Failover · Encryption</text>
  <text x="410" y="484" fill="#d1fae5" font-size="11" text-anchor="middle">ChaCha20-Poly1305 at rest</text>

  <!-- Fetcher -->
  <rect x="570" y="140" width="170" height="75" rx="8" fill="url(#gFetcher)" filter="url(#shadow)"/>
  <text x="655" y="165" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">Fetcher Tier</text>
  <text x="655" y="183" fill="#fef3c7" font-size="11" text-anchor="middle">Stateless DMZ bridges</text>
  <text x="655" y="198" fill="#fef3c7" font-size="11" text-anchor="middle">Git · S3 · GCS · MinIO</text>

  <!-- Search -->
  <rect x="570" y="405" width="170" height="70" rx="8" fill="url(#gSearch)" filter="url(#shadow)"/>
  <text x="655" y="430" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">Search Service</text>
  <text x="655" y="448" fill="#fce7f3" font-size="11" text-anchor="middle">Out-of-band Zoekt indexing</text>
  <text x="655" y="463" fill="#fce7f3" font-size="11" text-anchor="middle">Regex · Literal · File glob</text>

  <!-- Upstream -->
  <rect x="790" y="200" width="120" height="60" rx="8" fill="url(#gUpstream)" filter="url(#shadow)"/>
  <text x="850" y="225" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Upstream</text>
  <text x="850" y="245" fill="#94a3b8" font-size="11" text-anchor="middle">Git · S3 · GCS</text>

  <!-- Arrows: Router → Storage (read path) -->
  <path d="M400,215 L400,390" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="380" y="310" fill="#34d399" font-size="9" font-family="monospace">Read/Write</text>

  <!-- Arrows: Router → Fetcher (job dispatch) -->
  <path d="M500,177 L555,177" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="528" y="170" fill="#f59e0b" font-size="9" font-family="monospace">dispatch</text>

  <!-- Arrows: Fetcher → Upstream -->
  <path d="M740,177 L775,200" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="770" y="183" fill="#64748b" font-size="9" font-family="monospace">push/pull</text>

  <!-- Arrows: Router → Search -->
  <path d="M450,215 C500,230 520,300 570,420" stroke="#ec4899" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="535" y="320" fill="#ec4899" font-size="9" font-family="monospace">index trigger</text>

  <!-- Arrows: FUSE Client → Storage (data path) -->
  <path d="M200,190 C240,300 200,450 300,450" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="235" y="380" fill="#34d399" font-size="9" font-family="monospace">Direct reads</text>

  <!-- Legend -->
  <rect x="300" y="530" width="450" height="48" rx="6" fill="none" stroke="#1e293b" stroke-width="1"/>
  <text x="320" y="550" fill="#94a3b8" font-size="10" font-family="monospace">── Read path (gRPC direct to storage)</text>
  <line x1="320" y1="562" x2="370" y2="562" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="470" y="550" fill="#94a3b8" font-size="10" font-family="monospace">·· Control / Publish path</text>
  <line x1="470" y1="562" x2="520" y2="562" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>
</svg>
