name: CI — Proto

on:
  push:
    branches: [main]
    paths:
      - 'api/proto/**.proto'
  pull_request:
    branches: [main]
    paths:
      - 'api/proto/**.proto'

jobs:
  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler

      - name: install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: regenerate proto
        run: make proto

      - name: check for drift
        run: |
          if ! git diff --exit-code api/proto/; then
            echo "::error::Generated proto files are out of date. Run 'make proto' and commit the result."
            git diff --stat api/proto/
            exit 1
          fi
